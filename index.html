<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cafe Neurotico Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* ── PALETTE ──────────────────────────────────────────────────────────────── */
  :root {
    --bg:           #2C1E16;
    --bg_panel:     rgba(67,40,24,0.6);
    --bg_menu:      #432818;
    --accent:       #D4A373;
    --text_main:    #FFE6A7;
    --text_sec:     #E6CC98;
    --text_dim:     #A47148;
    --border:       rgba(212,163,115,0.2);
    --border_solid: #8B5A2B;
    --clock-scale:  1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'Raleway', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
    -webkit-app-region: drag;
  }

  button, input, select { -webkit-app-region: no-drag; font-family: 'Raleway', sans-serif; }

  /* ── ROOT CONTAINER ────────────────────────────────────────────────────────── */
  #app {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* ── KEN BURNS LAYER ─────────────────────────────────────────────────────── */
  #kb-layer {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    display: none;
  }
  .kb-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .kb-img.visible { opacity: 1; }

  @keyframes kb1 { from { transform: scale(1.0) translate(0%,  0%); } to { transform: scale(1.18) translate(-3%, -2%); } }
  @keyframes kb2 { from { transform: scale(1.0) translate(2%,  0%); } to { transform: scale(1.18) translate(-1%, -3%); } }
  @keyframes kb3 { from { transform: scale(1.0) translate(0%,  2%); } to { transform: scale(1.18) translate( 3%, -1%); } }
  @keyframes kb4 { from { transform: scale(1.0) translate(-2%,-2%); } to { transform: scale(1.18) translate( 2%,  2%); } }
  .kb-img.v1 { animation: kb1 14s ease-in-out forwards; }
  .kb-img.v2 { animation: kb2 14s ease-in-out forwards; }
  .kb-img.v3 { animation: kb3 14s ease-in-out forwards; }
  .kb-img.v4 { animation: kb4 14s ease-in-out forwards; }

  /* ── WINDOW CONTROLS ─────────────────────────────────────────────────────── */
  #win-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 300;
    display: flex;
    gap: 5px;
    -webkit-app-region: no-drag;
  }
  .wbtn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border_solid);
    background: rgba(0,0,0,0.55);
    color: var(--text_dim);
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    line-height: 1;
  }
  .wbtn:hover               { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .wbtn.wbtn-close:hover    { background: #c62828; border-color: #c62828; color: #fff; }

  /* ══════════════════════════════════════════════════════════════════════════
     THEME: MINIMALIST
     Small floating widget · dashed border · semi-transparent bg
  ══════════════════════════════════════════════════════════════════════════ */
  #app.theme-minimalist {
    border: 2px dashed var(--accent);
    border-radius: 10px;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px);
  }

  /* show KB images when enabled */
  #app.theme-minimalist.kb-on #kb-layer { display: block; }
  #app.theme-minimalist.kb-on #kb-overlay { display: block; }

  #app.theme-minimalist #clock-face {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; position: relative; z-index: 10;
  }
  #app.theme-minimalist #brand-label {
    position: absolute; top: 9px; left: 13px;
    font-size: calc(8px * var(--clock-scale)); font-weight: 900; color: var(--text_dim);
    letter-spacing: 4px; text-transform: uppercase;
  }
  #app.theme-minimalist #time-main  {
    font-size: calc(66px * var(--clock-scale)); font-weight: 900;
    color: var(--text_main); letter-spacing: 3px; line-height: 1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }
  #app.theme-minimalist #time-secs  {
    font-size: calc(22px * var(--clock-scale)); font-weight: 700; color: var(--accent);
    vertical-align: super; margin-left: 2px; line-height: 1;
  }
  #app.theme-minimalist #date-line  {
    font-size: calc(11px * var(--clock-scale)); font-weight: 700; color: var(--text_sec);
    letter-spacing: 3px; text-transform: uppercase;
  }
  #app.theme-minimalist #crema-circle { display: none; }
  #app.theme-minimalist #time-wrap { display: flex; align-items: flex-start; }
  #app.theme-minimalist #day-line  { display: none; }

  /* ══════════════════════════════════════════════════════════════════════════
     THEME: CREMA SPLASH
     Full dark bg · central circle · CREMA boot aesthetic
  ══════════════════════════════════════════════════════════════════════════ */
  #app.theme-crema { background: var(--bg); }
  #app.theme-crema.kb-on #kb-layer  { display: block; }
  #app.theme-crema.kb-on #kb-overlay { display: block; }

  #app.theme-crema #clock-face {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; z-index: 10;
  }
  #app.theme-crema #brand-label {
    position: absolute; top: calc(80px * var(--clock-scale));
    color: var(--text_dim); letter-spacing: 10px;
    font-weight: 900; font-size: calc(18px * var(--clock-scale)); text-transform: uppercase;
  }
  #app.theme-crema #crema-circle {
    position: absolute;
    width: calc(400px * var(--clock-scale)); height: calc(400px * var(--clock-scale)); border-radius: 50%;
    background: var(--border_solid);
    box-shadow: 0 0 100px rgba(0,0,0,0.7), 0 0 40px rgba(212,163,115,0.15);
  }
  #app.theme-crema #time-wrap {
    position: relative; z-index: 1;
    display: flex; align-items: center;
  }
  #app.theme-crema #date-line { position: relative; z-index: 1; }
  #app.theme-crema #time-main {
    font-size: calc(88px * var(--clock-scale)); font-weight: 900;
    color: var(--text_main); letter-spacing: 2px; line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }
  #app.theme-crema #time-secs {
    font-size: calc(30px * var(--clock-scale)); font-weight: 700; color: var(--accent);
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
  }
  #app.theme-crema #date-line {
    font-size: calc(15px * var(--clock-scale)); font-weight: 700; color: var(--text_sec);
    letter-spacing: 5px; text-transform: uppercase; margin-top: 10px;
  }
  #app.theme-crema #day-line {
    position: absolute; bottom: calc(90px * var(--clock-scale));
    color: var(--text_sec); font-size: calc(14px * var(--clock-scale));
    letter-spacing: 6px; font-weight: 700; text-transform: uppercase;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     THEME: KEN BURNS
     Game art fills window · KB always on · clock centered over dark overlay
  ══════════════════════════════════════════════════════════════════════════ */
  #app.theme-kenburns { background: var(--bg); }
  #app.theme-kenburns #kb-layer   { display: block; }
  #app.theme-kenburns #kb-overlay { display: block; }

  #app.theme-kenburns #clock-face {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
  }
  #app.theme-kenburns #brand-label {
    font-size: calc(10px * var(--clock-scale)); font-weight: 900;
    color: rgba(255,230,167,0.55); letter-spacing: 8px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  #app.theme-kenburns #time-main {
    font-size: calc(128px * var(--clock-scale)); font-weight: 900;
    color: #ffffff; letter-spacing: 4px; line-height: 1;
    text-shadow: 0 4px 40px rgba(0,0,0,0.95), 0 0 80px rgba(212,163,115,0.2);
  }
  #app.theme-kenburns #time-secs {
    font-size: calc(38px * var(--clock-scale)); font-weight: 700; color: var(--accent);
    vertical-align: super; margin-left: 6px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }
  #app.theme-kenburns #date-line {
    font-size: calc(17px * var(--clock-scale)); font-weight: 700;
    color: rgba(255,230,167,0.75); letter-spacing: 5px; text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9); margin-top: 4px;
  }
  #app.theme-kenburns #crema-circle { display: none; }
  #app.theme-kenburns #time-wrap    { display: flex; align-items: flex-start; }
  #app.theme-kenburns #day-line     { display: none; }

  /* ── KB overlay (dark gradient for readability) ───────────────────────── */
  #kb-overlay {
    position: absolute; inset: 0; z-index: 1; display: none;
    background: linear-gradient(
      to top,
      rgba(20,10,5,0.90) 0%,
      rgba(20,10,5,0.35) 35%,
      rgba(20,10,5,0.35) 65%,
      rgba(20,10,5,0.70) 100%
    );
  }

  /* ── Game name label ─────────────────────────────────────────────────── */
  #kb-game-label {
    position: absolute;
    bottom: 18px; left: 18px;
    z-index: 5;
    display: none;
    background: rgba(0,0,0,0.52);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 5px 12px;
    pointer-events: none;
    max-width: 70%;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #kb-game-label.visible { opacity: 1; }
  #app.theme-minimalist #kb-game-label { display: none !important; }
  #kb-game-name {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.88);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }
</style>
</head>
<body>
<div id="app" class="theme-minimalist">

  <!-- ── Ken Burns layer ──────────────────────────────────────────────────── -->
  <div id="kb-layer">
    <img class="kb-img" id="kb-img-a" src="" alt="">
    <img class="kb-img" id="kb-img-b" src="" alt="">
    <div id="kb-overlay"></div>
    <div id="kb-game-label"><span id="kb-game-name"></span></div>
  </div>

  <!-- ── Clock face ───────────────────────────────────────────────────────── -->
  <div id="clock-face">
    <div id="brand-label">CAFE NEUROTICO</div>

    <!-- decorative circle (crema theme only, purely visual) -->
    <div id="crema-circle"></div>
    <div id="time-wrap">
      <span id="time-main">00:00</span><span id="time-secs">:00</span>
    </div>
    <div id="date-line">LOADING…</div>
    <div id="day-line"></div>
  </div>

  <!-- ── Window controls ──────────────────────────────────────────────────── -->
  <div id="win-controls">
    <button class="wbtn" id="btn-settings" title="Settings">⚙</button>
    <button class="wbtn" id="btn-minimize" title="Minimise">−</button>
    <button class="wbtn wbtn-close" id="btn-close" title="Close">✕</button>
  </div>

</div>
<script src="themes.js"></script>
<script src="renderer.js"></script>
</body>
</html>
