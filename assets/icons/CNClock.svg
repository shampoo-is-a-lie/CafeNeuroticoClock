<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <circle cx="256" cy="256" r="240" fill="#432818" stroke="#8B5A2B" stroke-width="16"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#D4A373" stroke-width="4" stroke-dasharray="12 8"/>
  <circle cx="256" cy="256" r="12" fill="#D4A373"/>
  <!-- Hour hand: pointing ~10 o'clock -->
  <line x1="256" y1="256" x2="180" y2="140" stroke="#FFE6A7" stroke-width="16" stroke-linecap="round"/>
  <!-- Minute hand: pointing ~2 o'clock -->
  <line x1="256" y1="256" x2="340" y2="110" stroke="#FFE6A7" stroke-width="10" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="256" y1="256" x2="256" y2="90" stroke="#D4A373" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour markers -->
  <circle cx="256" cy="66" r="6" fill="#8B5A2B"/>
  <circle cx="256" cy="446" r="6" fill="#8B5A2B"/>
  <circle cx="66" cy="256" r="6" fill="#8B5A2B"/>
  <circle cx="446" cy="256" r="6" fill="#8B5A2B"/>
  <!-- CN brand text -->
  <text x="256" y="360" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="28" fill="#A47148" letter-spacing="8">CN</text>
</svg>
